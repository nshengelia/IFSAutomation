name: Smoke Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'

jobs:
  smoke:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore ./ifs-automation.csproj

      - name: Build
        run: dotnet build ./ifs-automation.csproj --no-restore --configuration Release

      - name: Run smoke tests (push / PR)
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        run: dotnet test ./ifs-automation.csproj --no-build --configuration Release --filter "Category=smoke" --logger "console;verbosity=normal"
        env:
          API_BASEURL: ${{ secrets.API_BASEURL }}

      - name: Run all tests (scheduled)
        if: github.event_name == 'schedule'
        run: dotnet test ./ifs-automation.csproj --no-build --configuration Release --logger "console;verbosity=normal"
        env:
          API_BASEURL: ${{ secrets.API_BASEURL }}

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: "**/Logs/*.log"
          retention-days: 7
